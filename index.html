<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yousef Instagram</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fafafa; font-family: Arial; }
nav { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; }
nav h1 { font-size: 24px; font-family: cursive; }
.post { background: white; margin: 60px auto 10px; max-width: 470px; border: 1px solid #dbdbdb; }
.post-header { padding: 10px; display: flex; align-items: center; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(#f09433,#e6683c,#dc2743,#cc2366,#bc1888); margin-right: 10px; }
.post-actions { padding: 10px; font-size: 20px; }
.post-likes { padding: 0 10px; font-weight: bold; font-size: 14px; }
.post-caption { padding: 5px 10px; font-size: 14px; }
</style>
</head>
<body>
<nav>
<h1>Instagram</h1>
<span>❤️</span>
</nav>
<div class="post">
<div class="post-header">
<div class="avatar"></div>
<strong>yousef</strong>
</div>
<div style="width:100%;height:300px;background:#efefef;"></div>
<div class="post-actions">❤️ 💬 📤</div>
<div class="post-likes">100 likes</div>
<div class="post-caption"><strong>yousef</strong> My first post!</div>
</div>
</body>
</html>
